name: Refresh dashboard data

# Pulls CPI/PPI (BLS) + Fed Funds (FRED) and commits data.json.
# CPI and PPI publish ~once a month, so a weekday-morning run reliably catches
# new releases and revisions without hammering the APIs (2 BLS calls + 1 FRED).

on:
  schedule:
    # 14:00 UTC on weekdays (~09:00-10:00 ET). BLS releases land ~08:30 ET.
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # needed to commit data.json back to the repo

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull BLS + FRED -> data.json
        id: pull
        continue-on-error: true   # we still want to commit the failure status + last-good data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set +e
          python scripts/fetch_data.py
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Generate AI commentary (optional, never blocks the data pull)
        continue-on-error: true   # commentary is best-effort and always exits 0 anyway
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # COMMENTARY_MODEL: claude-sonnet-4-6   # uncomment to override the default model
        run: python scripts/generate_commentary.py

      - name: Commit data.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json unchanged — nothing to commit."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Surface pull failure (mark job red)
        if: steps.pull.outputs.code != '0'
        run: |
          echo "::error::Data pull failed with code E${{ steps.pull.outputs.code }} — see the step log above and data.json 'status'."
          exit 1
